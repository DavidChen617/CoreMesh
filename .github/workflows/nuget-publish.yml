name: Publish NuGet Packages

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature name to publish (e.g. Outbox, Validation, Mapper)'
        required: true
        type: string

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve projects to pack
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FEATURE="${{ github.event.inputs.feature }}"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            FEATURE="${BRANCH#release/}"
          fi
          FEATURE="${FEATURE,,}"
          echo "feature=$FEATURE" >> $GITHUB_OUTPUT

          case "$FEATURE" in
            # Full group releases (abstractions/extensions included)
            dispatching)
              PROJECTS="src/Dispatching.Abstractions/Dispatching.Abstractions.csproj src/Dispatching/Dispatching.csproj"
              ;;
            endpoint)
              PROJECTS="src/Endpoints/Endpoints.csproj"
              ;;
            interception)
              PROJECTS="src/Interception/Interception.csproj src/Interception.Extensions/Interception.Extensions.csproj"
              ;;
            logging)
              PROJECTS="src/Logging/Logging.csproj"
              ;;
            middleware)
              PROJECTS="src/Middleware/Middleware.csproj"
              ;;
            mapper)
              PROJECTS="src/Mapper/Mapper.csproj src/Mapper.Extensions/Mapper.Extensions.csproj"
              ;;
            result)
              PROJECTS="src/Result/Result.csproj src/Result.AspNetCore/Result.AspNetCore.csproj"
              ;;
            validation)
              PROJECTS="src/Validation.Abstractions/Validation.Abstractions.csproj src/Validation/Validation.csproj"
              ;;
            outbox)
              PROJECTS="src/Outbox.Abstractions/Outbox.Abstractions.csproj src/Outbox/Outbox.csproj"
              ;;
            # Individual sub-package releases
            dispatching.abstractions)
              PROJECTS="src/Dispatching.Abstractions/Dispatching.Abstractions.csproj"
              ;;
            interception.extensions)
              PROJECTS="src/Interception.Extensions/Interception.Extensions.csproj"
              ;;
            mapper.extensions)
              PROJECTS="src/Mapper.Extensions/Mapper.Extensions.csproj"
              ;;
            result.aspnetcore)
              PROJECTS="src/Result.AspNetCore/Result.AspNetCore.csproj"
              ;;
            validation.abstractions)
              PROJECTS="src/Validation.Abstractions/Validation.Abstractions.csproj"
              ;;
            outbox.abstractions)
              PROJECTS="src/Outbox.Abstractions/Outbox.Abstractions.csproj"
              ;;
            *)
              echo "::warning::Unknown feature: $FEATURE — no projects to pack."
              PROJECTS=""
              ;;
          esac

          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT

      - name: Pack
        if: steps.resolve.outputs.projects != ''
        run: |
          for PROJECT in ${{ steps.resolve.outputs.projects }}; do
            echo "Packing $PROJECT"
            dotnet pack "$PROJECT" -c Release -o ./nupkg
          done

      - name: Push to NuGet
        if: steps.resolve.outputs.projects != ''
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
